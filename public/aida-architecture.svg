  <text x="506" y="372" font-size="13" fill="#111827" text-anchor="middle" font-weight="600" font-family="monospace">Postgres</text>
  <text x="506" y="390" font-size="10" fill="#9ca3af" text-anchor="middle">repo-db</text>

  <rect x="680" y="348" width="300" height="56" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="830" y="372" font-size="13" fill="#111827" text-anchor="middle" font-weight="600" font-family="monospace">Redis</text>
