  <text x="34" y="46" font-size="13" fill="#6b7280" font-family="monospace" letter-spacing="2" font-weight="600">ARCHITECTURE</text>
  <rect x="1080" y="28" width="100" height="28" rx="14" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
