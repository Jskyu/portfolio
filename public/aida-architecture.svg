  <!-- Feedback loop: actuator -> scrape -->
  <path d="M 1162 208 L 1186 208 L 1186 558 L 986 558" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="1192" y="386" font-size="10" fill="#9ca3af" font-family="monospace">actuator → scrape</text>
