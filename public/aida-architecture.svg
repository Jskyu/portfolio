  <text x="666" y="212" font-size="12" fill="#111827" text-anchor="middle" font-weight="600" font-family="monospace">user</text>

  <rect x="742" y="180" width="134" height="56" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="809" y="212" font-size="12" fill="#111827" text-anchor="middle" font-weight="600" font-family="monospace">competition</text>

