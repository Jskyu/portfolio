  <text x="1046" y="306" font-size="10" fill="#9ca3af" text-anchor="middle">iRODS Jargon</text>

  <line x1="668" y1="320" x2="668" y2="343" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arr)"/>

