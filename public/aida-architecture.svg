  <text x="34" y="562" font-size="11" fill="#0891b2" font-family="monospace" letter-spacing="1">MONITORING</text>

  <rect x="356" y="530" width="300" height="56" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="506" y="554" font-size="13" fill="#111827" text-anchor="middle" font-weight="600" font-family="monospace">Prometheus</text>
  <text x="506" y="572" font-size="10" fill="#9ca3af" text-anchor="middle">metrics scrape</text>

  <rect x="680" y="530" width="300" height="56" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="830" y="554" font-size="13" fill="#111827" text-anchor="middle" font-weight="600" font-family="monospace">Grafana</text>
